<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northquest Daily Posting Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;padding:1.5rem}
.container{max-width:700px;margin:0 auto}
.header{text-align:center;margin-bottom:1.5rem}
.header h1{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.header p{font-size:13px;color:#888}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border:1px solid #ddd;border-radius:10px;overflow:hidden;background:#fff}
.tab{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:14px;color:#666;border:none;background:none;font-family:inherit}
.tab.active{background:#1a1a1a;color:#fff;font-weight:600}
.card{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e8e8e8}
.section-title{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:1rem}
.field{margin-bottom:1rem}
label{display:block;font-size:13px;color:#555;margin-bottom:5px;font-weight:500}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a1a1a}
textarea{height:72px;resize:none}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-primary{background:#1a1a1a;color:#fff}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem}
.alert-success{background:#eaf3de;color:#27500a;border:1px solid #97c459}
.alert-error{background:#fcebeb;color:#791f1f;border:1px solid #f09595}

/* DASHBOARD STYLES */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px;text-align:center}
.stat-n{font-size:24px;font-weight:700;color:#1a1a1a}
.stat-l{font-size:11px;color:#888;margin-top:3px}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.week-nav button{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit}
.week-label{font-size:14px;font-weight:600;color:#1a1a1a}
.week-table{width:100%;border-collapse:collapse;font-size:13px}
.week-table th{background:#f5f5f3;padding:10px 8px;text-align:center;font-weight:600;color:#555;border:1px solid #e8e8e8;font-size:12px}
.week-table th.name-col{text-align:left;min-width:140px}
.week-table td{padding:10px 8px;text-align:center;border:1px solid #e8e8e8;color:#1a1a1a;vertical-align:middle}
.week-table td.name-col{text-align:left;font-weight:500;font-size:13px}
.week-table tr:nth-child(even) td{background:#fafafa}
.post-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:1px}
.dot-p1{background:#185fa5}
.dot-p2{background:#3b6d11}
.dot-none{background:#e0e0e0}
.cell-links{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.cell-link{font-size:11px;color:#185fa5;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;display:block}
.cell-link:hover{text-decoration:underline}
.legend{display:flex;gap:16px;font-size:12px;color:#666;margin-bottom:1rem;align-items:center}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.detail-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;margin-bottom:10px;overflow:hidden}
.detail-header{background:#f5f5f3;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.detail-header-name{font-size:14px;font-weight:600;color:#1a1a1a}
.detail-header-stats{font-size:12px;color:#888}
.detail-body{padding:10px 14px;display:none}
.detail-body.open{display:block}
.detail-row{display:grid;grid-template-columns:80px 60px 1fr 1fr;gap:8px;padding:6px 0;border-top:1px solid #f0f0f0;font-size:12px;align-items:start}
.detail-row:first-child{border-top:none}
.detail-row .dr-date{color:#555;font-weight:500}
.detail-row .dr-post{display:inline-block;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:600}
.dr-p1{background:#e6f1fb;color:#185fa5}
.dr-p2{background:#eaf3de;color:#3b6d11}
.dr-link{color:#185fa5;text-decoration:none;word-break:break-all;line-height:1.4}
.dr-link:hover{text-decoration:underline}
.issues-txt{color:#888;font-style:italic;font-size:11px;margin-top:2px}
.tab-bar{display:flex;gap:8px;margin-bottom:1rem;border-bottom:2px solid #f0f0f0;padding-bottom:0}
.dash-tab{padding:8px 16px;border:none;background:none;font-family:inherit;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.dash-tab.active{color:#1a1a1a;font-weight:600;border-bottom-color:#1a1a1a}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ffffff40;border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.filter-row input,.filter-row select{flex:1;width:auto}
.clear-btn{font-size:13px;color:#888;background:none;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}
.summary-bar{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.summary-chip{font-size:11px;padding:2px 8px;border-radius:5px;background:#f0f0f0;color:#555}
.summary-chip.full{background:#eaf3de;color:#3b6d11}
.summary-chip.partial{background:#fdf4e3;color:#855a0a}
.summary-chip.none{background:#fcebeb;color:#791f1f}
@media(max-width:500px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .week-table{font-size:11px}
  .week-table th,.week-table td{padding:6px 4px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Northquest Finance</h1>
    <p>Daily Posting Log</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('submit')">Submit a post</button>
    <button class="tab" onclick="showTab('dashboard')">Dashboard</button>
  </div>

  <!-- SUBMIT TAB -->
  <div id="tab-submit">
    <div class="card">
      <p class="section-title">Daily posting log</p>
      <div id="alert-box"></div>
      <div class="field">
        <label>Your full name</label>
        <input type="text" id="creator-name" placeholder="Type your full name exactly as registered..." />
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="post-date" />
      </div>
      <div class="field">
        <label>Which post is this?</label>
        <select id="post-number">
          <option value="1">Post 1 (first post of the day)</option>
          <option value="2">Post 2 (second post of the day)</option>
        </select>
      </div>
      <div class="field">
        <label>TikTok video link</label>
        <input type="url" id="tiktok-link" placeholder="https://www.tiktok.com/@..." />
      </div>
      <div class="field">
        <label>Instagram reel link</label>
        <input type="url" id="ig-link" placeholder="https://www.instagram.com/reel/..." />
      </div>
      <div class="field">
        <label>Any issues today? (optional)</label>
        <textarea id="issues" placeholder="e.g. Instagram was slow, video took longer to upload..."></textarea>
      </div>
      <button class="btn btn-primary" id="submit-btn" onclick="submitLog()">Submit log</button>
    </div>
  </div>

  <!-- DASHBOARD TAB -->
  <div id="tab-dashboard" style="display:none">
    <div class="stats-grid" id="stats-row">
      <div class="stat"><div class="stat-n">-</div><div class="stat-l">Total posts logged</div></div>
      <div class="stat"><div class="stat-n">-</div><div class="stat-l">Logged today</div></div>
      <div class="stat"><div class="stat-n">-</div><div class="stat-l">Active creators</div></div>
      <div class="stat"><div class="stat-n">-</div><div class="stat-l">This week's posts</div></div>
    </div>

    <div class="tab-bar">
      <button class="dash-tab active" onclick="switchDashTab('weekly')">Weekly grid</button>
      <button class="dash-tab" onclick="switchDashTab('detail')">Detailed log</button>
    </div>

    <!-- WEEKLY GRID VIEW -->
    <div id="dash-weekly">
      <div class="card">
        <div class="week-nav">
          <button onclick="changeWeek(-1)">&#8592; Prev</button>
          <span class="week-label" id="week-label">Loading...</span>
          <button onclick="changeWeek(1)">Next &#8594;</button>
        </div>
        <div class="legend">
          <span><span class="legend-dot" style="background:#185fa5;display:inline-block"></span>Post 1 logged</span>
          <span><span class="legend-dot" style="background:#3b6d11;display:inline-block"></span>Post 2 logged</span>
          <span><span class="legend-dot" style="background:#e0e0e0;display:inline-block"></span>Not logged</span>
        </div>
        <div style="overflow-x:auto">
          <table class="week-table" id="week-table">
            <thead id="week-thead"></thead>
            <tbody id="week-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- DETAILED LOG VIEW -->
    <div id="dash-detail" style="display:none">
      <div class="card">
        <p class="section-title">Filter submissions</p>
        <div class="filter-row">
          <input type="text" id="filter-name" placeholder="Search by name..." oninput="renderDetail()" />
          <input type="date" id="filter-date" onchange="renderDetail()" />
          <button class="clear-btn" onclick="clearFilters()">Clear</button>
        </div>
      </div>
      <div id="detail-list"></div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLrQ6h0XAOKIxYw_r2uMbb_FtBq_ZBBFdBAQpeLHo9Z9ZKkzISuje9CvuTF-RcWgFgmQ/exec';
const DASHBOARD_PASSWORD = 'NQ2026dash';
let dashUnlocked = false;
let allEntries = [];
let currentWeekOffset = 0;

document.getElementById('post-date').value = new Date().toISOString().split('T')[0];

function showTab(tab) {
  if(tab === 'dashboard' && !dashUnlocked) {
    const entered = prompt('Enter dashboard password:');
    if(entered !== DASHBOARD_PASSWORD) { alert('Incorrect password.'); return; }
    dashUnlocked = true;
  }
  document.getElementById('tab-submit').style.display = tab === 'submit' ? 'block' : 'none';
  document.getElementById('tab-dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='submit')||(i===1&&tab==='dashboard')));
  if(tab === 'dashboard') loadDashboard();
}

function switchDashTab(tab) {
  document.getElementById('dash-weekly').style.display = tab === 'weekly' ? 'block' : 'none';
  document.getElementById('dash-detail').style.display = tab === 'detail' ? 'block' : 'none';
  document.querySelectorAll('.dash-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='weekly')||(i===1&&tab==='detail')));
  if(tab === 'detail') renderDetail();
}

function showAlert(msg, type) {
  const box = document.getElementById('alert-box');
  box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  if(type === 'success') setTimeout(() => box.innerHTML = '', 5000);
}

async function submitLog() {
  const name = document.getElementById('creator-name').value.trim();
  const date = document.getElementById('post-date').value;
  const postNum = document.getElementById('post-number').value;
  const tiktok = document.getElementById('tiktok-link').value.trim();
  const ig = document.getElementById('ig-link').value.trim();
  const issues = document.getElementById('issues').value.trim();

  if(!name){ showAlert('Please enter your full name.', 'error'); return; }
  if(!date){ showAlert('Please select a date.', 'error'); return; }
  if(!tiktok && !ig){ showAlert('Please provide at least one video link.', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Submitting...';

  try {
    const params = new URLSearchParams({action:'submit', name, date, postNum, tiktok, ig, issues});
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    const data = await res.json();
    if(data.status === 'duplicate') {
      showAlert(`You already logged Post ${postNum} for ${date}. Contact Smith if this is an error.`, 'error');
    } else if(data.status === 'ok') {
      showAlert('Post logged successfully! Well done.', 'success');
      document.getElementById('tiktok-link').value = '';
      document.getElementById('ig-link').value = '';
      document.getElementById('issues').value = '';
    } else {
      showAlert('Something went wrong. Please try again.', 'error');
    }
  } catch(e) {
    showAlert('Could not connect. Please check your internet and try again.', 'error');
  }
  btn.disabled = false;
  btn.innerHTML = 'Submit log';
}

async function loadDashboard() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=get');
    allEntries = await res.json();
    updateStats();
    renderWeeklyGrid();
  } catch(e) {
    document.getElementById('week-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#aaa">Could not load data. Check connection.</td></tr>';
  }
}

function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  const total = allEntries.length;
  const todayCount = allEntries.filter(e => e.date === today).length;
  const creators = new Set(allEntries.map(e => e.name)).size;
  const weekDates = getWeekDates(0);
  const weekCount = allEntries.filter(e => weekDates.includes(e.date)).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total posts logged</div></div>
    <div class="stat"><div class="stat-n">${todayCount}</div><div class="stat-l">Logged today</div></div>
    <div class="stat"><div class="stat-n">${creators}</div><div class="stat-l">Active creators</div></div>
    <div class="stat"><div class="stat-n">${weekCount}</div><div class="stat-l">This week's posts</div></div>
  `;
}

function getWeekDates(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().split('T')[0];
  });
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  renderWeeklyGrid();
}

function renderWeeklyGrid() {
  const dates = getWeekDates(currentWeekOffset);
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const fmt = d => { const [y,m,day] = d.split('-'); return `${day}/${m}`; };

  document.getElementById('week-label').textContent = `${fmt(dates[0])} - ${fmt(dates[6])}`;

  document.getElementById('week-thead').innerHTML = `
    <tr>
      <th class="name-col">Creator</th>
      ${dates.map((d,i) => `<th>${days[i]}<br><span style="font-weight:400;color:#aaa;font-size:10px">${fmt(d)}</span></th>`).join('')}
      <th>Week<br><span style="font-weight:400;color:#aaa;font-size:10px">total</span></th>
    </tr>
  `;

  const creators = [...new Set(allEntries.map(e => e.name))].sort();
  if(!creators.length) {
    document.getElementById('week-tbody').innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:#aaa">No submissions yet.</td></tr>';
    return;
  }

  document.getElementById('week-tbody').innerHTML = creators.map(name => {
    let weekTotal = 0;
    const cells = dates.map(date => {
      const p1 = allEntries.find(e => e.name === name && e.date === date && e.postNum === '1');
      const p2 = allEntries.find(e => e.name === name && e.date === date && e.postNum === '2');
      if(p1) weekTotal++;
      if(p2) weekTotal++;
      const links = [
        p1 && p1.tiktok ? `<a class="cell-link" href="${p1.tiktok}" target="_blank">P1 TT</a>` : '',
        p1 && p1.ig ? `<a class="cell-link" href="${p1.ig}" target="_blank">P1 IG</a>` : '',
        p2 && p2.tiktok ? `<a class="cell-link" href="${p2.tiktok}" target="_blank">P2 TT</a>` : '',
        p2 && p2.ig ? `<a class="cell-link" href="${p2.ig}" target="_blank">P2 IG</a>` : '',
      ].filter(Boolean).join('');
      const dots = `
        <span class="post-dot ${p1 ? 'dot-p1' : 'dot-none'}" title="Post 1"></span>
        <span class="post-dot ${p2 ? 'dot-p2' : 'dot-none'}" title="Post 2"></span>
      `;
      return `<td>${dots}${links ? `<div class="cell-links">${links}</div>` : ''}</td>`;
    }).join('');

    const pct = Math.round((weekTotal / 14) * 100);
    const chipClass = pct >= 100 ? 'full' : pct >= 50 ? 'partial' : 'none';
    return `<tr>
      <td class="name-col">${name}<br><span class="summary-chip ${chipClass}" style="font-size:10px;padding:1px 6px">${weekTotal}/14</span></td>
      ${cells}
      <td style="font-weight:700;color:${pct>=100?'#27500a':pct>=50?'#855a0a':'#791f1f'}">${weekTotal}</td>
    </tr>`;
  }).join('');
}

function renderDetail() {
  const nameF = document.getElementById('filter-name').value.toLowerCase();
  const dateF = document.getElementById('filter-date').value;
  let filtered = [...allEntries];
  if(nameF) filtered = filtered.filter(e => e.name.toLowerCase().includes(nameF));
  if(dateF) filtered = filtered.filter(e => e.date === dateF);
  filtered.sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));

  const list = document.getElementById('detail-list');
  if(!filtered.length){ list.innerHTML = '<div class="empty">No entries found.</div>'; return; }

  const byCreator = {};
  filtered.forEach(e => { if(!byCreator[e.name]) byCreator[e.name] = []; byCreator[e.name].push(e); });

  list.innerHTML = Object.entries(byCreator).map(([name, entries]) => `
    <div class="detail-card">
      <div class="detail-header" onclick="toggleDetail(this)">
        <span class="detail-header-name">${name}</span>
        <span class="detail-header-stats">${entries.length} submission${entries.length!==1?'s':''}</span>
      </div>
      <div class="detail-body">
        ${entries.map(e => `
          <div class="detail-row">
            <span class="dr-date">${e.date}</span>
            <span class="dr-post ${e.postNum==='1'?'dr-p1':'dr-p2'}">Post ${e.postNum}</span>
            <span>
              ${e.tiktok ? `<a class="dr-link" href="${e.tiktok}" target="_blank">TikTok</a>` : '<span style="color:#ccc">No TikTok</span>'}
              ${e.issues ? `<div class="issues-txt">"${e.issues}"</div>` : ''}
            </span>
            <span>
              ${e.ig ? `<a class="dr-link" href="${e.ig}" target="_blank">Instagram</a>` : '<span style="color:#ccc">No Instagram</span>'}
            </span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleDetail(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function clearFilters() {
  document.getElementById('filter-name').value = '';
  document.getElementById('filter-date').value = '';
  renderDetail();
}
</script>
</body>
</html>
